name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
          include:
            - os: macos-latest
              platform: mac
              arch: arm64
            - os: ubuntu-latest
              platform: linux
              arch: x64
            - os: windows-latest
              platform: win
              arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron & electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"

      - name: Install root dependencies
        run: npm ci
        env:
          ELECTRON_CACHE: ~/.cache/electron
          ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install proxy-bridge dependencies
        working-directory: proxy-bridge
        run: npm ci

      - name: Rebuild node-pty for Electron
        working-directory: proxy-bridge
        run: npx electron-rebuild --version 29.2.0 --module-dir . --which-module node-pty
        env:
          ELECTRON_CACHE: ~/.cache/electron
          ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build
        env:
          VITE_ELECTRON: 'true'

      - name: Write proxy-bridge .env.local
        shell: bash
        run: |
          printf 'GITHUB_CLIENT_ID=%s\nGITHUB_CLIENT_SECRET=%s\nFRONTEND_URL=http://localhost:5173\nALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173\nGEMINI_CLI_CLIENT_ID=%s\nGEMINI_CLI_OAUTH_CLIENT_SECRET=%s\nANTIGRAVITY_CLIENT_ID=%s\nANTIGRAVITY_CLIENT_SECRET=%s\n' \
            "${{ secrets.GH_OAUTH_CLIENT_ID }}" \
            "${{ secrets.GH_OAUTH_CLIENT_SECRET }}" \
            "${{ secrets.GEMINI_CLI_CLIENT_ID }}" \
            "${{ secrets.GEMINI_CLI_OAUTH_CLIENT_SECRET }}" \
            "${{ secrets.ANTIGRAVITY_CLIENT_ID }}" \
            "${{ secrets.ANTIGRAVITY_CLIENT_SECRET }}" \
            > proxy-bridge/.env.local

      - name: Build proxy-bridge
        working-directory: proxy-bridge
        run: npm run build

      - name: Compile Electron
        run: npm run compile:electron

      - name: Copy Electron output
        shell: bash
        run: npm run copy:electron && npm run fix:export

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --x64 --publish never

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          body: |
            ## Installation

            ### macOS
            > **"QueenBee is damaged and can't be opened"** — this is a macOS Gatekeeper warning for unsigned apps. Run this once after installing:
            > ```bash
            > xattr -cr /Applications/QueenBee.app
            > ```
            > Then double-click the app normally.

            ### Windows
            Download and run `QueenBee Setup x.x.x.exe`. Windows SmartScreen may warn on first run — click **More info → Run anyway**.

            ### Linux
            Download the `.AppImage`, make it executable and run:
            ```bash
            chmod +x QueenBee-*.AppImage && ./QueenBee-*.AppImage
            ```
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
